<!DOCTYPE html>
<html>
<head>
    <title>Frames Example - Horizontal</title>
</head>
<frameset rows="33%,34%,33%">
    <frame src="https://images.all-free-download.com/images/graphicwebp/sunset_183112.webp" name="imageFrame" noresize>
    <frame src="./paragraph.txt" name="paragraphFrame" noresize>
    <frame src="https://example.com" name="linkFrame" noresize>
    <noframes>
        <body>
            <p>Your browser does not support frames. Please use a modern browser.</p>
        </body>
    </noframes>
</frameset>
</html>
